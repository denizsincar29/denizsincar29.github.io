<html>
<head>
<title>count down</title>
<meta charset="utf-8">
<script>
function showdate(){
	let dest=new Date(2022, 11, 31, 5, 55);
	let diff=dest.getTime()-Date.now();
	let diffs=[diff/1000];
	diffs.push(diffs[0]/60);
	diffs.push(diffs[1]/60);
	diffs.push(diffs[2]/24);
	document.getElementById("d").innerText=Math.floor(diffs[3]*1000)/1000;
	document.getElementById("h").innerText=Math.floor(diffs[2]*1000)/1000;
	document.getElementById("m").innerText=Math.floor(innerText=diffs[1]*100)/100;
	document.getElementById("s").innerText=Math.floor(diffs[0]*10)/10;
}

setInterval(showdate,100);
</script>
</head>
<body>
<h1>count down</h1>
days: <div id="d"></div><br>
hours: <div id="h"></div><br>
minutes: <div id="m"></div><br>
seconds: <div id="s"></div>


</body>
</html>
