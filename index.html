<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>iRealPro editor</title>
	<link href="ireal.css" rel="stylesheet" />
	<script src="russian.js"></script>
	<script src="main.js"></script>
</head>

<body>
	<nav class="top-block">
		<div class="top-block-left">
			<div class="form-group">
				<label for="title_input" id="title">title</label>
				<input type="text" id="title_input" name="song title" />
			</div>
			<div class="form-group">
				<label for="name" id="composer1">composer name</label>
				<input type="text" id="name" name="Name" />
			</div>
			<div class="form-group">
				<label for="name2" id="composer2">composer's last name</label>
				<input type="text" id="name2" name="last name" />
			</div>
		</div>
		
		<div class="form-group">
			<label for="select_style" id="style"></label>
			<select id="select_style" size="10"></select>
		</div>
		<div class="form-group">
			<label for="key_select" id="key"></label>
			<select id="key_select" size="10"></select>
		</div>
		<div class="form-group">
			<label for="select_ts" id="time"></label>
			<select id="select_ts" size="10"></select>
		</div>
	</nav>

	<main class="main">
		<div class="form-group">
			<label for="thelist" id="mainlabel"></label>
			<select id="thelist" size="10"></select>
		</div>
		<div class="form-group">
			<label for="selectkey" id="chordkey"></label>
			<select id="selectkey" size="10"></select>
		</div>
		<div class="form-group">
			<label for="selectfn" id="chordfn"></label>
			<select id="selectfn" size="10"></select>
		</div>

		<button class="button" onclick="enterchord()" id="addchord">add the chord</button>
	</main>
</body>

</html>
